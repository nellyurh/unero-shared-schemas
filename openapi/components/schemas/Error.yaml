Error:
  type: object
  required: [error, request_id]
  additionalProperties: false
  properties:
    error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          pattern: '^[A-Z]+_[0-9]{3}$'
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
    request_id:
      type: string
    docs_url:
      type: string
      format: uri
